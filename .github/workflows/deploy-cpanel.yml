name: Deploy Frontend to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Write deploy marker
        run: |
          echo "commit=${GITHUB_SHA}" > dist/deploy-version.txt
          echo "run=${GITHUB_RUN_ID}" >> dist/deploy-version.txt
          echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/deploy-version.txt

      - name: Upload via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: 21
          protocol: ftps
          security: loose
          timeout: 120000
          local-dir: dist/
          server-dir: /public_html/
